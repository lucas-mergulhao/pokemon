<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon ULTRA - Definitive Edition</title>
    <style>
        :root { --sky: #4facfe; --grass-l: #76b852; --grass-d: #2d5a27; --ui: #fdfce0; --flash: rgba(255,255,255,0); }
        body { margin: 0; font-family: 'Courier New', monospace; background: #000; color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        body::after { content: ""; position: fixed; inset: 0; background: var(--flash); pointer-events: none; z-index: 999; transition: 0.1s; }

        /* --- CORREÇÃO DO CÉU E CLIMAS --- */
        .bg { 
            position: fixed; inset: 0; 
            background: linear-gradient(to bottom, var(--sky) 0%, #00f2fe 50%, var(--grass-l) 50%, var(--grass-d) 100%); 
            z-index: -1; transition: 1s filter, 1s background; 
        }
        .weather-rain { filter: hue-rotate(180deg) brightness(0.7); }
        .weather-sun { filter: sepia(0.4) brightness(1.2) saturate(1.4); }
        .weather-sand { filter: sepia(0.8) hue-rotate(-20deg) contrast(1.1); }
        
        .ground { position: absolute; bottom: 0; width: 100%; height: 50%; background: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(to bottom, var(--grass-l), var(--grass-d)); background-size: 60px 60px; transform: perspective(500px) rotateX(65deg); transform-origin: top; animation: move 3s linear infinite; }
        @keyframes move { from { background-position: 0 0; } to { background-position: 0 60px; } }

        #game, #level-up, #menu { position: absolute; inset: 0; display: none; flex-direction: column; height: 100vh; text-align: center; }
        #menu { display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 100; }
        #level-up { align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 90; }
        #game { z-index: 50; transition: filter 0.5s; }

        .scene { flex: 1; position: relative; overflow: hidden; }
        #player { position: absolute; bottom: 15%; left: 8%; width: 50vw; max-width: 320px; z-index: 10; transition: 0.3s; transform: scale(1.3); }
        #enemy { position: absolute; top: 35%; right: 10%; width: 40vw; max-width: 220px; z-index: 5; transition: 0.3s; }
        
        /* Shiny & KO Effect */
        #enemy.shiny { filter: drop-shadow(0 0 15px gold) brightness(1.1); }
        .ko-finisher { filter: grayscale(1) contrast(1.5) !important; }

        .dmg-num { position: absolute; font-size: 35px; font-weight: 900; color: white; text-shadow: 2px 2px 0 #000; animation: floatUp 0.8s ease-out forwards; z-index: 1000; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }

        .hud { position: absolute; width: 180px; background: var(--ui); padding: 8px; border: 3px solid #333; color: #111; box-shadow: 4px 4px 0 #000; z-index: 20; }
        #h-e { top: 20px; left: 20px; }
        #h-p { bottom: 140px; right: 20px; }
        .hp { height: 100%; background: #4caf50; transition: 0.5s; }
        .burst { height: 100%; background: #ffeb3b; box-shadow: 0 0 8px #ffeb3b; transition: 0.3s; }

        .panel { background: #222; border-top: 4px solid #000; padding: 10px; display: grid; grid-template-columns: 1fr 1.2fr; gap: 8px; height: 150px; z-index: 80; position: relative; }
        #msg-box { background: #fff; border: 3px solid #333; color: #000; padding: 10px; font-weight: bold; font-size: 13px; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; }
        #atks { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        
        .btn { border: 3px solid #000; font-family: inherit; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; border-radius: 4px; touch-action: manipulation; }
        .btn:disabled { filter: grayscale(1) brightness(0.7); cursor: not-allowed; }
        .b-u { background: linear-gradient(45deg, #9c27b0, #e91e63); color: #fff; grid-column: span 2; box-shadow: 0 0 10px #9c27b0; }

        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body>
    <div id="bg-main" class="bg"><div class="ground"></div></div>
    
    <div id="menu">
        <div style="background: white; padding: 20px; border-radius: 15px; color: black; border: 5px solid #ffeb3b;">
            <h1 style="margin:0">ULTRA ELITE</h1>
            <p id="high-score" style="color: #f00; font-weight: bold;"></p>
            <p>Escolha seu Pokémon:</p>
            <button onclick="start(0)" style="background:#81c784; padding:15px; border:none; border-radius:8px; margin:5px; font-weight:bold;">Bulbasaur</button>
            <button onclick="start(1)" style="background:#e57373; padding:15px; border:none; border-radius:8px; margin:5px; font-weight:bold;">Charmander</button>
            <button onclick="start(2)" style="background:#64b5f6; padding:15px; border:none; border-radius:8px; margin:5px; font-weight:bold;">Squirtle</button>
        </div>
    </div>

    <div id="level-up">
        <h2 style="color:#ffeb3b; text-shadow: 2px 2px #000;">EVOLUÇÃO!</h2>
        <button onclick="chooseBonus('atk')" style="background:#ff5252; color:white; padding:20px; width:250px; margin:10px; font-weight:bold; border:3px solid #000;">⚔️ ATAQUE (+20%)</button>
        <button onclick="chooseBonus('def')" style="background:#ffd740; padding:20px; width:250px; margin:10px; font-weight:bold; border:3px solid #000;">🛡️ DEFESA (+15%)</button>
        <button onclick="chooseBonus('pot')" style="background:#80d8ff; padding:20px; width:250px; margin:10px; font-weight:bold; border:3px solid #000;">🧪 +1 POÇÃO MAX</button>
    </div>

    <div id="game">
        <div class="scene" id="scene">
            <img id="enemy" src="">
            <img id="player" src="">
            <div id="h-e" class="hud"><strong><span id="e-n"></span></strong><div style="background:#444;height:8px;margin-top:4px"><div id="e-hp" class="hp"></div></div><div style="background:#333;height:4px;margin-top:2px"><div id="e-bt" class="burst"></div></div></div>
            <div id="h-p" class="hud"><strong><span id="p-n"></span></strong><div style="background:#444;height:8px;margin-top:4px"><div id="p-hp" class="hp"></div></div><div style="background:#333;height:4px;margin-top:2px"><div id="p-bt" class="burst"></div></div></div>
        </div>
        <div class="panel">
            <div id="msg-box"><span id="msg-sub" style="font-size: 10px; color: #d32f2f;"></span><span id="msg">Início!</span></div>
            <div id="atks"></div>
        </div>
    </div>

    <script>
        const pks = [
            { n: "Bulbasaur", t: "planta", f: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png", b: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/1.png", effect: "VENENO", s: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/1.png" },
            { n: "Charmander", t: "fogo", f: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png", b: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/4.png", effect: "QUEIMAR", s: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/4.png" },
            { n: "Squirtle", t: "agua", f: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png", b: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/7.png", effect: "CONFUSO", s: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/7.png" }
        ];

        let p, e, hpP=500, hpE=500, btP=0, btE=0, turn=1, potsP=2, maxPots=2, cdP={f:0, m:0}, wins=0, eMult=1, pAtkMult=1, pDefMult=1, weather="clear";

        window.onload = () => {
            const h = localStorage.getItem('ultra_wins') || 0;
            if(h > 0) document.getElementById('high-score').innerText = `Recorde: ${h} Vitórias`;
        };

        function start(i) {
            p = pks[i]; hpP=500; pAtkMult=1; pDefMult=1; maxPots=2; potsP=2; wins=0; eMult=1; btP=0;
            document.getElementById('game').classList.remove('ko-finisher');
            nextEnemy();
            document.getElementById('menu').style.display="none";
            document.getElementById('game').style.display="flex";
            render();
        }

        function nextEnemy() {
            e = pks[Math.floor(Math.random()*3)];
            hpE = 500; btE = 0;
            const isShiny = Math.random() < 0.1;
            const eImg = document.getElementById('enemy');
            eImg.src = isShiny ? e.s : e.f;
            isShiny ? eImg.classList.add('shiny') : eImg.classList.remove('shiny');
            
            const weathers = ["clear", "rain", "sun", "sand"];
            weather = weathers[Math.floor(Math.random()*weathers.length)];
            document.getElementById('bg-main').className = "bg weather-" + weather;
            
            document.getElementById('player').src = p.b;
            document.getElementById('p-n').innerText = p.n;
            document.getElementById('e-n').innerText = e.n + (isShiny ? " ✨" : "");
            msg(`Batalha ${wins+1}: Clima ${weather}!`);
        }

        function render() {
            const area = document.getElementById('atks');
            area.innerHTML = `
                <button class="btn" style="background:#ff5252;color:#fff" onclick="atk(100,'f')" ${cdP.f>0||turn!==1?'disabled':''}>🔥 Forte ${cdP.f>0?`(${cdP.f})`:''}</button>
                <button class="btn" style="background:#ffd740" onclick="atk(65,'m')" ${cdP.m>0||turn!==1?'disabled':''}>⚡ Médio ${cdP.m>0?`(${cdP.m})`:''}</button>
                <button class="btn" style="background:#80d8ff" onclick="atk(35,'w')" ${turn!==1?'disabled':''}>💨 Fraco</button>
                <button class="btn" style="background:#69f0ae" onclick="heal()" ${potsP==0||turn!==1?'disabled':''}>🧪 Cura (${potsP})</button>
                <button id="btn-u" class="btn b-u" style="display:${btP>=100?'block':'none'}" onclick="atk(220,'u')">🌟 ULTIMATE 🌟</button>
            `;
            updateBars();
        }

        function updateBars() {
            document.getElementById('p-hp').style.width = (hpP/500*100)+"%";
            document.getElementById('e-hp').style.width = (hpE/500*100)+"%";
            document.getElementById('p-bt').style.width = btP+"%";
            document.getElementById('e-bt').style.width = btE+"%";
        }

        function showDmg(val, isCrit, isPlayer) {
            const num = document.createElement('div');
            num.className = 'dmg-num';
            num.innerText = val;
            if(isCrit) num.style.color = '#ffeb3b';
            const rect = document.getElementById(isPlayer ? 'player' : 'enemy').getBoundingClientRect();
            num.style.left = (rect.left + rect.width/2) + 'px';
            num.style.top = (rect.top + rect.height/2) + 'px';
            document.body.appendChild(num);
            setTimeout(() => num.remove(), 800);
        }

        function atk(base, tipo) {
            if(turn!==1) return;
            turn = 0; render();
            if(tipo==='f') { cdP.f=4; document.getElementById('scene').classList.add('shake'); setTimeout(()=>document.getElementById('scene').classList.remove('shake'), 300); }
            if(tipo==='m') cdP.m=2;
            if(tipo==='u') { btP=0; triggerFlash("white"); document.getElementById('scene').classList.add('shake'); }
            
            execute(document.getElementById('player'), document.getElementById('enemy'), base, p, e, true, (isKO) => {
                if(hpE<=0) winBattle(isKO); else { turn=2; setTimeout(ia, 800); }
            });
        }

        function execute(aImg, dImg, base, pAtk, pDef, isP, cb) {
            let mult = 1;
            if((pAtk.t==="agua"&&pDef.t==="fogo")||(pAtk.t==="fogo"&&pDef.t==="planta")||(pAtk.t==="planta"&&pDef.t==="agua")) mult = 1.6;
            if(weather==="rain" && pAtk.t==="agua") mult *= 1.3;
            if(weather==="sun" && pAtk.t==="fogo") mult *= 1.3;

            let crit = Math.random() < 0.15;
            let total = Math.floor(base * mult * (crit?1.8:1) * (isP?pAtkMult:(eMult * pDefMult)));
            
            const isKO = isP && hpE - total <= 0 && base > 60;
            if(isKO) document.getElementById('game').classList.add('ko-finisher');

            aImg.style.transform = isP ? "scale(1.5) translate(40px, -40px)" : "scale(1.2) translate(-30px, 30px)";
            
            setTimeout(() => {
                aImg.style.transform = isP ? "scale(1.3)" : "scale(1)";
                dImg.style.filter = "brightness(3)";
                if(isP) { hpE=Math.max(0, hpE-total); btP=Math.min(100, btP+15); showDmg(total, crit, false); }
                else { hpP=Math.max(0, hpP-total); btE=Math.min(100, btE+15); showDmg(total, crit, true); }
                updateBars();
                setTimeout(() => { dImg.style.filter = ""; cb(isKO); }, 300);
            }, 200);
        }

        function ia() {
            if(hpE <= 0) return;
            let b = btE >= 100 ? 200 : 50; if(btE>=100) btE=0;
            execute(document.getElementById('enemy'), document.getElementById('player'), b, e, p, false, () => {
                if(hpP<=0) return end("VOCÊ PERDEU!");
                if(cdP.f>0) cdP.f--; if(cdP.m>0) cdP.m--;
                turn=1; render(); msg("Sua vez!");
            });
        }

        function winBattle(ko) {
            wins++; hpP=Math.min(500, hpP+150); potsP=maxPots;
            if(ko) triggerFlash("gold");
            setTimeout(() => {
                document.getElementById('game').classList.remove('ko-finisher');
                if(wins % 2 === 0) {
                    document.getElementById('game').style.display="none";
                    document.getElementById('level-up').style.display="flex";
                } else {
                    eMult += 0.15; nextEnemy(); turn=1; render();
                }
            }, 1000);
        }

        function chooseBonus(t) {
            if(t==='atk') pAtkMult+=0.2; if(t==='def') pDefMult*=0.85; if(t==='pot') maxPots=3;
            document.getElementById('level-up').style.display="none";
            document.getElementById('game').style.display="flex";
            nextEnemy(); turn=1; render();
        }

        function msg(m) { document.getElementById('msg').innerText = m; }
        function triggerFlash(c) { document.documentElement.style.setProperty('--flash', c==="gold"?"rgba(255,215,0,0.5)":"rgba(255,255,255,0.7)"); setTimeout(()=>document.documentElement.style.setProperty('--flash','transparent'), 150); }
        function heal() { hpP=Math.min(500, hpP+160); potsP--; turn=2; updateBars(); setTimeout(ia, 800); }
        function end(t) { 
            const h = localStorage.getItem('ultra_wins') || 0;
            if(wins > h) localStorage.setItem('ultra_wins', wins);
            msg(t); document.getElementById('atks').innerHTML = `<button onclick="location.reload()" style="grid-column:span 2;padding:15px;background:gold;font-weight:bold">REINICIAR</button>`;
        }
    </script>
</body>
</html>
